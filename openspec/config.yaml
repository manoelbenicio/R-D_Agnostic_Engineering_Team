schema: spec-driven

context: |
  # R&D Agnostic Engineering Team — Project Context (Rotation-Parity Polyglot)

  Managed-agents platform. **Multica** (Go, L4 control plane) launches
  **prodex** (Rust, L2 data plane, pinned v0.246.0) on the hot path instead of
  raw `codex`: pre-commit rotation, affinity, Smart Context / token-saver, and
  reset-claim. Program name: **Rotation-Parity Polyglot (RPP)**.

  ## Layers
  - **L4 (cold)** — Multica Go server: sessions, workspaces, kanban, auth.
    Source: `multica-auth-work/server`. Health on `127.0.0.1:8080/health`.
  - **L2 (hot)** — prodex Rust sidecar, spawned per session by the backend.
    Contract `rpp.l2.v1`. Built binary at `bin/prodex`.
  - **Frontend** — Multica web (Next.js) at `multica-auth-work/apps/web`,
    plus mobile (Expo) and desktop (Electron). Local: http://localhost:3100.
  - **Data** — Postgres (pgvector).

  ## Authoritative sources
  - OpenSpec changes: `rotation-parity-polyglot`, `rotation-router`,
    `agent-credential-isolation`.
  - GSD planning: `.planning/` (PROJECT/REQUIREMENTS/ROADMAP/STATE/RCA).
  - Diligences: `Diligencias/` (charter, context, dependency/crate/env matrices).
  - Contracts: `docs/contract/rpp-l2-v1-contract.md`, `docs/contracts/`.

  ## Security invariants
  - Caveman/hook (`PRODEX_CAVEMAN_HOOK_*`) disabled by default (RCE risk).
  - `PRODEX_ALLOW_UNSAFE_CHILD_ENV=off`; secrets via secret-store, never in logs.
  - No shared SQLite for state; single router per session.
