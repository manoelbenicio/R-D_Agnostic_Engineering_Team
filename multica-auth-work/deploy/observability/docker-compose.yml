# =============================================================================
# Observability stack — easy deploy (doc 05-observability.md)
# Stream W-OBS — 100% independente do codigo Go (nao toca nenhum .go).
#
#   docker compose up -d            # sobe o stack completo
#
# Portas: prometheus 9090 | grafana 3000 | alertmanager 9093 | postgres-exporter 9187
#
# Segredos: NUNCA hardcoded. Via docker secrets (arquivos em ./secrets/, gitignored):
#   - grafana_admin_password  -> GF_SECURITY_ADMIN_PASSWORD__FILE (nativo Grafana)
#   - pg_user / pg_pass       -> lidos pelo wrapper pg-exporter-entrypoint.sh
#                                (a imagem do postgres-exporter nao tem *_FILE nativo)
# Veja secrets/*.example e README.md.
# =============================================================================

name: multica-observability

services:
  prometheus:
    image: prom/prometheus:latest
    container_name: multica-prometheus
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./alerts.yml:/etc/prometheus/alerts.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=${PROM_RETENTION:-15d}"
      - "--web.enable-lifecycle"
    ports:
      - "9090:9090"
    networks: [observability]

  alertmanager:
    image: prom/alertmanager:latest
    container_name: multica-alertmanager
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - alertmanager_data:/alertmanager
    command:
      - "--config.file=/etc/alertmanager/alertmanager.yml"
      - "--storage.path=/alertmanager"
    ports:
      - "9093:9093"
    networks: [observability]

  grafana:
    image: grafana/grafana-oss:latest
    container_name: multica-grafana
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      # Segredo via arquivo (docker secret) — NUNCA hardcoded.
      GF_SECURITY_ADMIN_PASSWORD__FILE: /run/secrets/grafana_admin_password
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_AUTH_ANONYMOUS_ENABLED: "false"
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    ports:
      - "3000:3000"
    secrets: [grafana_admin_password]
    depends_on: [prometheus]
    networks: [observability]

  postgres-exporter:
    # Saude do store de credencial (Postgres do produto) — RNF-04.
    image: quay.io/prometheuscommunity/postgres-exporter:latest
    container_name: multica-postgres-exporter
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    # A imagem nao suporta *_FILE nativo: o wrapper le os docker secrets e monta
    # o DATA_SOURCE_NAME em runtime, sem nunca colocar segredo na config/env fixa.
    entrypoint: ["/bin/sh", "/entrypoint.sh"]
    volumes:
      - ./pg-exporter-entrypoint.sh:/entrypoint.sh:ro
    environment:
      # Nao-secretos (host/db/sslmode) — configuraveis via .env. Sem credencial aqui.
      PG_HOST: ${PG_HOST:-host.docker.internal:5432}
      PG_DB: ${PG_DB:-multica}
      PG_SSLMODE: ${PG_SSLMODE:-disable}
    ports:
      - "9187:9187"
    secrets: [pg_user, pg_pass]
    networks: [observability]

networks:
  observability:
    name: multica-observability
    driver: bridge

volumes:
  prometheus_data:
  alertmanager_data:
  grafana_data:

secrets:
  grafana_admin_password:
    file: ./secrets/grafana_admin_password
  pg_user:
    file: ./secrets/pg_user
  pg_pass:
    file: ./secrets/pg_pass
