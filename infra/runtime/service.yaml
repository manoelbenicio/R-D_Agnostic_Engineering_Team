# AgentVerse — Cloud Run service manifest for the orchestration runtime.
#
# PER-TENANT MODEL (task 3.4)
#   Isolation is one Cloud Run *service* per tenant, built from the *same*
#   shared image. The image is tenant-neutral; everything tenant-specific is
#   injected here at apply time. This gives each tenant:
#     * its own service name / URL          (network + identity boundary)
#     * its own env + secrets               (config + credential boundary)
#     * its own autoscaling + resource caps (blast-radius + cost boundary)
#     * containerConcurrency=1              (process isolation per tmux runtime)
#
# Apply (single tenant) with:
#   TENANT_ID=acme PROJECT_ID=… REGION=us-central1 IMAGE_TAG=latest \
#   SPA_ORIGIN=https://acme.example.app \
#     envsubst < infra/runtime/service.yaml \
#     | gcloud run services replace - --region "$REGION"
#
# scripts/deploy-cloud.sh exports every variable below with a safe default, so
# a bare `./scripts/deploy-cloud.sh` deploys the `default` tenant.
#
# Required / tunable env vars (defaults live in scripts/deploy-cloud.sh):
#   TENANT_ID              : tenant slug, namespaces the service    (e.g. acme)
#   PROJECT_ID             : GCP project id                         (e.g. agentverse-prod)
#   REGION                 : Cloud Run region                       (e.g. us-central1)
#   IMAGE_TAG              : image tag to deploy                    (e.g. latest or $SHORT_SHA)
#   SPA_ORIGIN             : public origin of the SPA               (e.g. https://acme.example.app)
#   MIN_SCALE / MAX_SCALE  : per-tenant autoscaling bounds          (e.g. 0 / 10)
#   CONTAINER_CONCURRENCY  : in-flight requests per instance        (1 = isolated)
#   CPU_LIMIT / MEMORY_LIMIT : per-tenant resource caps             (e.g. 1 / 1Gi)
#   TIMEOUT_SECONDS        : request timeout                        (e.g. 3600)
#
# Notes
#   * `--allow-unauthenticated` is intentionally NOT set here. Server-side auth
#     enforcement (Cloud Run IAM vs custom proxy) is documented in
#     docs/cloud-runtime-auth.md (task 6.5 — human decision point).
#   * Per-tenant provider secrets live in Secret Manager. The wiring is shown
#     in the commented `secretKeyRef` block below; it is commented out because
#     the secret must be provisioned first (BLOCKED: needs a real GCP project —
#     see docs/cloud-runtime-auth.md "Per-tenant secrets").

apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: agentverse-runtime-${TENANT_ID}
  labels:
    app: agentverse-runtime
    tenant: ${TENANT_ID}
  annotations:
    run.googleapis.com/launch-stage: BETA
    run.googleapis.com/ingress: all
spec:
  template:
    metadata:
      labels:
        app: agentverse-runtime
        tenant: ${TENANT_ID}
      annotations:
        autoscaling.knative.dev/minScale: "${MIN_SCALE}"
        autoscaling.knative.dev/maxScale: "${MAX_SCALE}"
        run.googleapis.com/cpu-throttling: "true"
        run.googleapis.com/execution-environment: gen2
        run.googleapis.com/startup-cpu-boost: "true"
    spec:
      containerConcurrency: ${CONTAINER_CONCURRENCY}
      timeoutSeconds: ${TIMEOUT_SECONDS}
      containers:
        - image: ${REGION}-docker.pkg.dev/${PROJECT_ID}/agentverse/runtime:${IMAGE_TAG}
          ports:
            - name: http1
              containerPort: 8080
          resources:
            limits:
              cpu: "${CPU_LIMIT}"
              memory: ${MEMORY_LIMIT}
          env:
            - name: PORT
              value: "8080"
            - name: GO_CORE_HOST
              value: "0.0.0.0"
            - name: GO_CORE_TENANT_ID
              value: ${TENANT_ID}
            # Per-tenant state prefix. With a Cloud Run gen2 volume mount this
            # keeps each tenant's sessions/logs/profiles under its own path.
            - name: GO_CORE_STATE_PREFIX
              value: /root/.go-core/${TENANT_ID}
            - name: GO_CORE_CORS_ORIGINS
              value: ${SPA_ORIGIN}
            - name: GO_CORE_ALLOWED_HOSTS
              value: 0.0.0.0,127.0.0.1,localhost
            - name: GO_CORE_WS_ALLOWED_CLIENTS
              value: ${SPA_ORIGIN}
            # --- Per-tenant provider secrets (BLOCKED: needs GCP Secret Manager) ---
            # Provision first:
            #   gcloud secrets create agentverse-${TENANT_ID}-provider-keys --replication-policy=automatic
            #   gcloud secrets versions add agentverse-${TENANT_ID}-provider-keys --data-file=keys.env
            # then uncomment:
            # - name: GO_CORE_PROVIDER_KEYS
            #   valueFrom:
            #     secretKeyRef:
            #       name: agentverse-${TENANT_ID}-provider-keys
            #       key: latest
          startupProbe:
            httpGet:
              path: /health
              port: 8080
            timeoutSeconds: 5
            periodSeconds: 5
            failureThreshold: 12
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            timeoutSeconds: 5
            periodSeconds: 30
  traffic:
    - percent: 100
      latestRevision: true
