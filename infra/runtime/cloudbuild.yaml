# AgentVerse — Cloud Build pipeline for the orchestration runtime image.
#
# PER-TENANT MODEL (task 3.4)
#   The runtime image is *tenant-neutral* by design: tenant isolation happens
#   at the Cloud Run *service* layer (infra/runtime/service.yaml), not in the
#   image. So the DEFAULT build produces one shared image
#   (`.../runtime:${_TAG}`) that every tenant's service references.
#
#   Set `_TENANT` only when a tenant needs a pinned/custom image (e.g. a
#   bundled CLI it pays for). When `_TENANT` is empty the image name is the
#   shared `runtime`; when set it becomes `runtime-<tenant>`. Either way the
#   build context and Dockerfile are identical.
#
# Submit (shared image):
#   gcloud builds submit --config infra/runtime/cloudbuild.yaml \
#     --substitutions=_REGION=us-central1,_REPO=agentverse,_TAG=latest .
#
# Submit (tenant-pinned image):
#   gcloud builds submit --config infra/runtime/cloudbuild.yaml \
#     --substitutions=_REGION=us-central1,_REPO=agentverse,_TAG=latest,_TENANT=acme .
#
# Required substitutions:
#   _REGION : Artifact Registry region                (e.g. us-central1)
#   _REPO   : Artifact Registry repo name             (e.g. agentverse)
#   _TAG    : Image tag                                (default: $SHORT_SHA)
#   _TENANT : Optional tenant slug for a pinned image  (default: empty = shared)
#   _IMAGE  : Optional ARG forwarded to the Dockerfile WORKER_CLI build (task 2.6)
#
# The image is pushed to:
#   ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/runtime${_TENANT:+-${_TENANT}}:${_TAG}

substitutions:
  _REGION: us-central1
  _REPO: agentverse
  _TAG: ${SHORT_SHA}
  _TENANT: ""
  # WORKER_CLI build arg (task 2.6). Empty = no CLI baked in; the user picks.
  # See docs/cloud-runtime-auth.md "Bundling a worker CLI".
  _WORKER_CLI: ""
  # GO Core live-flag — set to '1' in trigger config when GO Core backend is available.
  # Sprint-3 RCA-A4: legacy live-flag variable replaced with GO_CORE_LIVE.
  _GO_CORE_LIVE: '0'
  _GO_CORE_BASE_URL: 'http://127.0.0.1:8080'

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: E2_HIGHCPU_8

steps:
  - id: build
    name: gcr.io/cloud-builders/docker
    entrypoint: bash
    args:
      - -c
      - |
        IMAGE="${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/runtime${_TENANT:+-${_TENANT}}"
        docker build \
          --build-arg "WORKER_CLI=${_WORKER_CLI}" \
          --tag "$${IMAGE}:${_TAG}" \
          --tag "$${IMAGE}:latest" \
          --file infra/runtime/Dockerfile \
          .

  - id: push-tag
    name: gcr.io/cloud-builders/docker
    waitFor: [build]
    entrypoint: bash
    args:
      - -c
      - |
        IMAGE="${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/runtime${_TENANT:+-${_TENANT}}"
        docker push "$${IMAGE}:${_TAG}"

  - id: push-latest
    name: gcr.io/cloud-builders/docker
    waitFor: [build]
    entrypoint: bash
    args:
      - -c
      - |
        IMAGE="${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/runtime${_TENANT:+-${_TENANT}}"
        docker push "$${IMAGE}:latest"

  # Sprint-3 CRIT-002 / RCA-A4: Contract tests gated on GO_CORE_LIVE.
  # These tests validate the frontend ↔ GO Core HTTP contract.
  # Skipped automatically when GO Core is not deployed in this environment.
  - name: 'node:20-slim'
    id: 'contract-tests'
    waitFor: [push-latest]
    entrypoint: bash
    args:
      - '-c'
      - |
        if [[ "$$GO_CORE_LIVE" == "1" ]]; then
          npx vitest run tests/contract/ --reporter=verbose
        else
          echo "Contract tests skipped (GO_CORE_LIVE != 1)"
        fi
    env:
      - 'GO_CORE_LIVE=${_GO_CORE_LIVE}'
      - 'VITE_GO_CORE_BASE_URL=${_GO_CORE_BASE_URL}'

timeout: 1200s
