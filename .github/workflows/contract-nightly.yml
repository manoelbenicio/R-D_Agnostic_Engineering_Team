name: contract-nightly

on:
  schedule:
    - cron: '0 3 * * *'    # Nightly at 3:00 UTC
  workflow_dispatch:      # Enable manual triggering

permissions:
  issues: write
  contents: read

jobs:
  contract-nightly:
    name: nightly CAO live contract
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20.10'
          cache: 'npm'
      - name: Install
        run: npm ci
      - name: Start CAO container
        run: docker run -d --name cao -p 9889:9889 cao-server
      - name: Wait for CAO container to be ready
        run: |
          for i in {1..30}; do
            curl -s http://localhost:9889/health && break
            sleep 1
          done
      - name: Contract suite
        env:
          CAO_LIVE: '1'
          VITE_CAO_BASE_URL: http://localhost:9889
        run: npm run test:contract
      - name: Create issue details on failure
        if: failure()
        run: |
          echo "The nightly contract suite failed against a live CAO container. There might be a shape drift in the CAO API." > issue.txt
          echo "Please check the run logs: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}" >> issue.txt
      - name: Create issue on failure
        if: failure()
        uses: peter-evans/create-issue-from-file@v5
        with:
          title: "🚨 Nightly CAO Contract Drift Detected!"
          content-filepath: ./issue.txt
          labels: |
            bug
            contract-drift
