name: contract-nightly

on:
  schedule:
    - cron: '0 3 * * *'    # Nightly at 3:00 UTC
  workflow_dispatch:      # Enable manual triggering

permissions:
  issues: write
  contents: read

jobs:
  contract-nightly:
    name: nightly GO Core live contract
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20.10'
          cache: 'npm'
      - name: Install
        run: npm ci
      - name: Start GO Core container
        run: docker run -d --name go-core -p 8080:8080 go-core-server
      - name: Wait for GO Core container to be ready
        run: |
          for i in {1..30}; do
            curl -s http://localhost:8080/health && break
            sleep 1
          done
      - name: Contract suite
        env:
          GO_CORE_LIVE: '1'
          VITE_GO_CORE_BASE_URL: http://localhost:8080
        run: npm run test:contract
      - name: Create issue details on failure
        if: failure()
        run: |
          echo "The nightly contract suite failed against a live GO Core container. There might be a shape drift in the GO Core API." > issue.txt
          echo "Please check the run logs: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}" >> issue.txt
      - name: Create issue on failure
        if: failure()
        uses: peter-evans/create-issue-from-file@v5
        with:
          title: "Nightly GO Core Contract Drift Detected"
          content-filepath: ./issue.txt
          labels: |
            bug
            contract-drift
