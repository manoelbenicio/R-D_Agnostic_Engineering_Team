name: smoke-live

on:
  schedule:
    - cron: '0 12 * * 0'   # Weekly on Sundays
  workflow_dispatch:      # Enable manual triggering

jobs:
  smoke-live-weekly:
    name: weekly live CAO smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20.10'
          cache: 'npm'
      - name: Install
        run: npm ci
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
      - name: Start CAO container
        run: docker run -d --name cao -p 9889:9889 cao-server
      - name: Wait for CAO container to be ready
        run: |
          for i in {1..30}; do
            curl -s http://localhost:9889/health && break
            sleep 1
          done
      - name: Run smoke against Live CAO (no MSW)
        env:
          CAO_LIVE: '1'
          VITE_USE_MSW: 'false'
          VITE_CAO_BASE_URL: http://localhost:9889
        run: npm run test:smoke
