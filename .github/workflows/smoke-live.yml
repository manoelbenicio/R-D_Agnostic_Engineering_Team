name: smoke-live

on:
  schedule:
    - cron: '0 12 * * 0'   # Weekly on Sundays
  workflow_dispatch:      # Enable manual triggering

jobs:
  smoke-live-weekly:
    name: weekly live GO Core smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20.10'
          cache: 'npm'
      - name: Install
        run: npm ci
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
      - name: Start GO Core container
        run: docker run -d --name go-core -p 8080:8080 go-core-server
      - name: Wait for GO Core container to be ready
        run: |
          for i in {1..30}; do
            curl -s http://localhost:8080/health && break
            sleep 1
          done
      - name: Run smoke against live GO Core (no MSW)
        env:
          GO_CORE_LIVE: '1'
          VITE_USE_MSW: 'false'
          VITE_GO_CORE_BASE_URL: http://localhost:8080
        run: npm run test:smoke
