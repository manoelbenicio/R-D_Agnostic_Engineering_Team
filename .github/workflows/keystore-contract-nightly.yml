name: keystore-contract-nightly

on:
  schedule:
    - cron: '0 4 * * *'   # Nightly at 04:00 UTC (1 h after the CAO contract suite)
  workflow_dispatch:      # Enable manual triggering

permissions:
  issues: write
  contents: read

jobs:
  keystore-contract-nightly:
    name: nightly keystore live contract
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20.10'
          cache: 'npm'
      - name: Install
        run: npm ci

      # Each provider key is read from a GitHub secret. The contract tests
      # detect missing env vars and skip the corresponding provider with a
      # warning, so the job stays green when individual secrets are absent.
      - name: Keystore contract suite
        env:
          KEYSTORE_LIVE: '1'
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AZURE_OPENAI_ENDPOINT: ${{ secrets.AZURE_OPENAI_ENDPOINT }}
          AZURE_OPENAI_API_KEY: ${{ secrets.AZURE_OPENAI_API_KEY }}
          MOONSHOT_API_KEY: ${{ secrets.MOONSHOT_API_KEY }}
          GITHUB_COPILOT_TOKEN: ${{ secrets.GITHUB_COPILOT_TOKEN }}
          OPENCODE_ENDPOINT: ${{ secrets.OPENCODE_ENDPOINT }}
          OPENCODE_API_KEY: ${{ secrets.OPENCODE_API_KEY }}
        run: npm run test:keystore-contract

      - name: Create issue details on failure
        if: failure()
        run: |
          {
            echo "The nightly keystore contract suite failed. A provider validator may be drifting (URL, auth header, or response shape change)."
            echo ""
            echo "Run logs: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            echo ""
            echo "Triage guide: docs/keystore-contract-tests.md"
          } > issue.txt

      - name: Create issue on failure
        if: failure()
        uses: peter-evans/create-issue-from-file@v5
        with:
          title: "🚨 Nightly Keystore Contract Drift Detected!"
          content-filepath: ./issue.txt
          labels: |
            bug
            contract-drift
            keystore
